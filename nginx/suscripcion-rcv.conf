# ============================================================
#  nginx — Suscripcion RCV (La Mundial de Seguros)
#
#  Instalar nginx en Ubuntu/Debian:
#    sudo apt install nginx
#
#  Copiar este archivo:
#    sudo cp suscripcion-rcv.conf /etc/nginx/sites-available/suscripcion-rcv
#    sudo ln -s /etc/nginx/sites-available/suscripcion-rcv /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#
#  HTTPS con Let's Encrypt (requiere dominio):
#    sudo apt install certbot python3-certbot-nginx
#    sudo certbot --nginx -d tudominio.com
#
#  HTTPS con certificado autofirmado (sin dominio, para pruebas):
#    sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#      -keyout /etc/ssl/private/rcv-selfsigned.key \
#      -out /etc/ssl/certs/rcv-selfsigned.crt \
#      -subj "/CN=localhost"
# ============================================================

# --- Upstream: Express en puerto 3001 ----------------------
upstream rcv_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

# --- Redirigir HTTP → HTTPS --------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name tudominio.com www.tudominio.com;   # <-- cambia esto

    # Si usas Let's Encrypt, certbot agrega sus líneas aqui automaticamente
    return 301 https://$host$request_uri;
}

# --- HTTPS principal ---------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tudominio.com www.tudominio.com;   # <-- cambia esto

    # ---- Certificados ------------------------------------
    # Opcion A: Let's Encrypt (certbot los rellena automaticamente)
    # ssl_certificate     /etc/letsencrypt/live/tudominio.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;

    # Opcion B: Autofirmado (sin dominio, navegador mostrara advertencia)
    ssl_certificate     /etc/ssl/certs/rcv-selfsigned.crt;
    ssl_certificate_key /etc/ssl/private/rcv-selfsigned.key;

    # ---- TLS seguro --------------------------------------
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    # ---- Cabeceras de seguridad --------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           DENY                                  always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header Referrer-Policy           strict-origin-when-cross-origin       always;

    # ---- Gzip -------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_vary on;

    # ---- Limite de subida (fotos, documentos) -----------
    client_max_body_size 30M;

    # ---- Proxy → Express --------------------------------
    location / {
        proxy_pass         http://rcv_backend;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";   # para WebSocket (Vite HMR en dev)

        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
    }

    # ---- Cache de assets estaticos (Vite genera hashes) -
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|otf|webp)$ {
        proxy_pass http://rcv_backend;
        proxy_set_header Host $host;
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---- Logs -------------------------------------------
    access_log /var/log/nginx/rcv-access.log;
    error_log  /var/log/nginx/rcv-error.log warn;
}
